info:
  name: Create Document
  type: http
  seq: 4

http:
  method: POST
  url: http://localhost:8080/api/v1/document
  body:
    type: json
    data: |-
      {
        "title": "One title",
        "content": "One content",
        "createdBy": 1,
        "lastEditedBy": 1
      }
  auth:
    type: basic
    username: user
    password: pwd

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
